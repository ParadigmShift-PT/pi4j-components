name: CI

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn verify --no-transfer-progress

      - name: Deploy to maven.paradigmshift.pt
        if: startsWith(github.ref, 'refs/tags/v')
        run: mvn deploy --no-transfer-progress -DskipTests -s .github/settings.xml
        env:
          REPOSILITE_TOKEN: ${{ secrets.REPOSILITE_TOKEN }}
